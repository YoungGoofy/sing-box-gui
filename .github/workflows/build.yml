name: Build Windows EXE

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # Ручной запуск

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download sing-box core
        run: |
          # Get latest sing-box release download URL for windows-amd64
          for i in 1 2 3; do
            URL=$(curl -sL "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | python -c "import sys,json; assets=json.load(sys.stdin)['assets']; print([a['browser_download_url'] for a in assets if 'windows-amd64' in a['name'] and a['name'].endswith('.zip')][-1])" 2>/dev/null)
            if [ -n "$URL" ]; then break; fi
            sleep 2
          done
          echo "Downloading: $URL"
          curl -L -o sing-box.zip "$URL"
          7z x sing-box.zip -osing-box-tmp
          move sing-box-tmp\sing-box.exe .

      - name: Build with PyInstaller
        run: |
          pyinstaller sing-box-gui.spec

      - name: Copy sing-box next to EXE
        run: |
          copy sing-box.exe dist\sing-box.exe

      - name: List output
        run: |
          dir dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SingBoxGUI
          path: |
            dist/SingBoxGUI.exe
            dist/sing-box.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/SingBoxGUI.exe
            dist/sing-box.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
